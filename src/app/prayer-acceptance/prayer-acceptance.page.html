<ion-header [translucent]="true">
  <ion-toolbar class="ios-prayer-toolbar">
    <ion-buttons slot="start">
      <ion-menu-button class="premium-hdr-menu-btn scholarly-hdr-menu-btn"></ion-menu-button>
    </ion-buttons>
    <ion-title class="ios-prayer-title scholarly-header-title ion-text-center">
      {{PageTitle}}
    </ion-title>
    <ion-buttons slot="end" class="premium-hdr-buttons scholarly-hdr-buttons">
      <ion-button routerLink="/home" class="premium-hdr-btn scholarly-hdr-btn">
        <ion-icon slot="icon-only" name="home-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
  
  <!-- Sleek Apple HIG style Scroll Progress Bar -->
  <div class="ios-scroll-progress-container">
    <div class="ios-scroll-progress-bar" [style.width.%]="scrollProgress"></div>
  </div>
</ion-header>

<ion-content [fullscreen]="true" [scrollEvents]="true" (ionScroll)="onScroll($event)" class="ios-prayer-content-bg ion-padding">
  <div class="ios-large-title-wrapper" *ngIf="PageTitle">
    <h1 class="ios-large-title">{{ PageTitle }}</h1>
  </div>

  <div class="ios-prayer-card-container">
    <div *ngFor="let item of data" class="ios-prayer-card ios-card">
      <div class="ios-prayer-header" *ngIf="item.SectionTitle">
        <h2 class="ios-prayer-card-title">{{ item.SectionTitle }}</h2>
        <div class="ios-title-underline"></div>
      </div>
      <div class="ios-prayer-content">
        <p *ngFor="let paragraph of item.Paragraphs" class="ios-prayer-paragraph">{{ paragraph }}</p>
      </div>
    </div>
  </div>
</ion-content>
